services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-room-booking-be
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    networks:
      - mynetwork

volumes:
  app-data:

networks:
  mynetwork:
    external: true